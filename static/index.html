<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Usage Checker</title>
<style>
  :root {
    --bg: #07090f;
    --card: rgba(22, 27, 38, 0.72);
    --line: rgba(255, 255, 255, 0.08);
    --line-strong: rgba(255, 255, 255, 0.16);
    --text: #eef2f8;
    --muted: #93a0b4;
    --accent: #6d8bff;
    --accent2: #a855f7;
    --good: #34d399;
    --warn: #fbbf24;
    --bad: #fb7185;
    --field: rgba(8, 11, 18, 0.6);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    background: var(--bg);
    overflow-x: hidden;
  }
  /* Aurora background */
  body::before, body::after {
    content: "";
    position: fixed;
    z-index: 0;
    width: 60vmax;
    height: 60vmax;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.5;
    pointer-events: none;
  }
  body::before { background: radial-gradient(circle, #2b3da8, transparent 60%); top: -20vmax; left: -10vmax; animation: float1 18s ease-in-out infinite; }
  body::after  { background: radial-gradient(circle, #6d28d9, transparent 60%); bottom: -22vmax; right: -12vmax; animation: float2 22s ease-in-out infinite; }
  @keyframes float1 { 50% { transform: translate(6vmax, 4vmax) scale(1.1); } }
  @keyframes float2 { 50% { transform: translate(-5vmax, -3vmax) scale(1.15); } }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    background: var(--card);
    backdrop-filter: blur(22px) saturate(140%);
    -webkit-backdrop-filter: blur(22px) saturate(140%);
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 30px;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.06);
  }

  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); box-shadow: 0 0 14px var(--accent); }
  h1 { margin: 0; font-size: 19px; font-weight: 650; letter-spacing: -0.01em; }
  .sub { margin: 0 0 18px; color: var(--muted); font-size: 13px; line-height: 1.5; }

  textarea {
    width: 100%;
    min-height: 86px;
    resize: vertical;
    background: var(--field);
    border: 1px solid var(--line);
    border-radius: 14px;
    color: var(--text);
    padding: 13px 15px;
    font-size: 13px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  textarea::placeholder { color: #5b6577; }
  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(109, 139, 255, 0.14); }

  button {
    width: 100%;
    margin-top: 12px;
    padding: 13px;
    border: 0;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.18s, opacity 0.18s;
    box-shadow: 0 10px 24px rgba(109, 139, 255, 0.28);
  }
  button:hover { transform: translateY(-1px); box-shadow: 0 14px 30px rgba(109, 139, 255, 0.36); }
  button:active { transform: translateY(0); }
  button:disabled { opacity: 0.65; cursor: default; transform: none; box-shadow: none; }

  .error {
    margin-top: 16px;
    display: none;
    align-items: center;
    gap: 8px;
    padding: 11px 13px;
    border-radius: 12px;
    background: rgba(251, 113, 133, 0.1);
    border: 1px solid rgba(251, 113, 133, 0.28);
    color: var(--bad);
    font-size: 13px;
    line-height: 1.4;
  }
  .error.show { display: flex; }

  .result { margin-top: 24px; display: none; }
  .result.show { display: block; animation: rise 0.45s cubic-bezier(0.2, 0.7, 0.2, 1); }
  @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  /* Ring */
  .ring-wrap { display: flex; justify-content: center; margin-bottom: 6px; }
  .ring { position: relative; width: 168px; height: 168px; }
  .ring svg { transform: rotate(-90deg); }
  .ring .track { fill: none; stroke: rgba(255, 255, 255, 0.07); stroke-width: 12; }
  .ring .fill {
    fill: none;
    stroke-width: 12;
    stroke-linecap: round;
    stroke: url(#grad);
    transition: stroke-dashoffset 0.9s cubic-bezier(0.2, 0.7, 0.2, 1);
    filter: drop-shadow(0 0 6px rgba(109, 139, 255, 0.5));
  }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-pct { font-size: 34px; font-weight: 700; letter-spacing: -0.02em; background: linear-gradient(135deg, #fff, #b9c4ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .ring-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

  .head-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 14px 0 16px; }
  .email { font-size: 14px; font-weight: 600; word-break: break-all; }
  .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; padding: 5px 11px; border-radius: 999px; white-space: nowrap; }
  .badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor; }
  .badge.good { background: rgba(52, 211, 153, 0.13); color: var(--good); }
  .badge.warn { background: rgba(251, 191, 36, 0.14); color: var(--warn); }
  .badge.bad  { background: rgba(251, 113, 133, 0.14); color: var(--bad); }

  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
  .stat { background: var(--field); border: 1px solid var(--line); border-radius: 14px; padding: 13px 15px; transition: border-color 0.18s; }
  .stat:hover { border-color: var(--line-strong); }
  .stat .label { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .stat .value { font-size: 16px; font-weight: 650; margin-top: 5px; letter-spacing: -0.01em; }

  .spinner { width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; display: inline-block; vertical-align: -2px; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <span class="dot"></span>
      <h1>Usage Checker</h1>
    </div>
    <p class="sub">Paste your vmess / vless / trojan / ss link to see your traffic and expiry.</p>

    <textarea id="link" placeholder="vmess://...   ·   vless://...   ·   trojan://..."></textarea>
    <button id="check">Check usage</button>

    <div class="error" id="error"></div>

    <div class="result" id="result">
      <div class="ring-wrap">
        <div class="ring">
          <svg width="168" height="168" viewBox="0 0 168 168">
            <defs>
              <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#6d8bff" />
                <stop offset="100%" stop-color="#a855f7" />
              </linearGradient>
            </defs>
            <circle class="track" cx="84" cy="84" r="72" />
            <circle class="fill" id="ringFill" cx="84" cy="84" r="72" />
          </svg>
          <div class="ring-center">
            <span class="ring-pct" id="ringPct">0%</span>
            <span class="ring-label" id="ringLabel">used</span>
          </div>
        </div>
      </div>

      <div class="head-row">
        <span class="email" id="email"></span>
        <span class="badge" id="status"></span>
      </div>

      <div class="stats">
        <div class="stat"><div class="label">Used</div><div class="value" id="used"></div></div>
        <div class="stat"><div class="label">Remaining</div><div class="value" id="remaining"></div></div>
        <div class="stat"><div class="label">Total</div><div class="value" id="total"></div></div>
        <div class="stat"><div class="label">Expires</div><div class="value" id="expires"></div></div>
      </div>
    </div>
  </div>

<script>
const button = document.getElementById("check");
const linkBox = document.getElementById("link");
const result = document.getElementById("result");
const errorBox = document.getElementById("error");

const RING_RADIUS = 72;
const RING_CIRCUMFERENCE = 2 * Math.PI * RING_RADIUS;
const ringFill = document.getElementById("ringFill");
ringFill.style.strokeDasharray = RING_CIRCUMFERENCE;
ringFill.style.strokeDashoffset = RING_CIRCUMFERENCE;

function formatBytes(bytes) {
  if (!bytes || bytes <= 0) return "0 B";
  const units = ["B", "KB", "MB", "GB", "TB"];
  let value = bytes;
  let unit = 0;
  while (value >= 1024 && unit < units.length - 1) { value /= 1024; unit++; }
  return value.toFixed(value >= 100 || unit === 0 ? 0 : 1) + " " + units[unit];
}

function formatExpiry(expiryTime) {
  if (!expiryTime || expiryTime === 0) return { text: "Never", expired: false };
  if (expiryTime < 0) return { text: "On first use", expired: false };
  const when = new Date(expiryTime);
  const days = Math.ceil((expiryTime - Date.now()) / 86400000);
  const date = when.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
  if (days < 0) return { text: date, expired: true };
  return { text: date + " · " + days + "d", expired: false };
}

function render(data) {
  const used = (data.up || 0) + (data.down || 0);
  const total = data.total || 0;
  const unlimited = total <= 0;
  const remaining = unlimited ? 0 : Math.max(total - used, 0);
  const percent = unlimited ? 0 : Math.min((used / total) * 100, 100);
  const expiry = formatExpiry(data.expiryTime);

  document.getElementById("email").textContent = data.email || "(no label)";
  document.getElementById("used").textContent = formatBytes(used);
  document.getElementById("total").textContent = unlimited ? "Unlimited" : formatBytes(total);
  document.getElementById("remaining").textContent = unlimited ? "Unlimited" : formatBytes(remaining);
  document.getElementById("expires").textContent = expiry.text;

  document.getElementById("ringPct").textContent = unlimited ? "∞" : Math.round(percent) + "%";
  document.getElementById("ringLabel").textContent = unlimited ? "no limit" : "used";

  // Reset then animate the ring on next frame so the transition always runs.
  ringFill.style.transition = "none";
  ringFill.style.strokeDashoffset = RING_CIRCUMFERENCE;
  requestAnimationFrame(() => {
    ringFill.style.transition = "";
    const shown = unlimited ? 0 : percent;
    ringFill.style.strokeDashoffset = RING_CIRCUMFERENCE * (1 - shown / 100);
  });

  const badge = document.getElementById("status");
  let label = "Active", cls = "good";
  if (!data.enable) { label = "Disabled"; cls = "bad"; }
  else if (!unlimited && used >= total) { label = "Limit reached"; cls = "bad"; }
  else if (expiry.expired) { label = "Expired"; cls = "bad"; }
  else if (!unlimited && percent >= 80) { label = "Running low"; cls = "warn"; }
  badge.textContent = label;
  badge.className = "badge " + cls;

  errorBox.classList.remove("show");
  result.classList.add("show");
}

function showError(message) {
  result.classList.remove("show");
  errorBox.textContent = message;
  errorBox.classList.add("show");
}

async function check() {
  const link = linkBox.value.trim();
  if (!link) { showError("Paste a config link first."); return; }

  button.disabled = true;
  button.innerHTML = '<span class="spinner"></span>';
  try {
    const response = await fetch("/api/check", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ link }),
    });
    const data = await response.json();
    if (data.ok) render(data);
    else showError(data.error || "Something went wrong.");
  } catch (e) {
    showError("Could not reach the server.");
  } finally {
    button.disabled = false;
    button.textContent = "Check usage";
  }
}

button.addEventListener("click", check);
linkBox.addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") check();
});
</script>
</body>
</html>
